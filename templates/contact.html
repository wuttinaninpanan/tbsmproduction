{% extends "base.html" %}

{% block title %}ติดต่อ — TBSMRD{% endblock %}

{% block content %}
<section class="py-12">
    <div class="max-w-3xl mx-auto">
        <div class="bg-white p-8 rounded-xl shadow-lg">
            <h1 class="text-2xl font-bold text-gray-900 mb-4">ติดต่อเรา</h1>
            <p class="text-gray-700 mb-6">
                ส่งข้อความมาหาเรา ทางทีมจะติดต่อกลับภายใน 1-2 วันทำการ
            </p>

            <form action="/contact/" method="post" class="space-y-4">
                {% csrf_token %}

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        ชื่อ
                    </label>
                    <input
                        name="name"
                        class="w-full rounded-md border border-gray-300 p-2
                               focus:outline-none focus:ring-2 focus:ring-red-500"
                    />
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        อีเมล
                    </label>
                    <input
                        type="email"
                        name="email"
                        class="w-full rounded-md border border-gray-300 p-2
                               focus:outline-none focus:ring-2 focus:ring-red-500"
                    />
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        ข้อความ
                    </label>
                    <textarea
                        name="message"
                        rows="6"
                        class="w-full rounded-md border border-gray-300 p-2
                               focus:outline-none focus:ring-2 focus:ring-red-500">
                    </textarea>
                </div>

                <button
                    type="submit"
                    class="inline-flex items-center px-5 py-2 rounded-md
                           bg-gradient-to-r from-red-600 to-red-500
                           text-white font-semibold hover:opacity-90">
                    ส่งข้อความ
                </button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
