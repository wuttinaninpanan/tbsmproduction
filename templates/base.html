{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>{% block title %}TBSMRD{% endblock %}</title>

	{% comment %} Use Tailwind CSS built from theme/static_src {% endcomment %}
	{% tailwind_css %}
    <!-- Inter font for cleaner UI -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
	<!-- Fallback styles if Tailwind hasn't been built yet -->
	<style>
	.min-h-screen{min-height:100vh}
	.flex{display:flex}
	.flex-col{flex-direction:column}
	.flex-1{flex:1 1 auto}
	.container{max-width:960px;margin:0 auto;padding-left:1rem;padding-right:1rem}
	/* Header: semi-transparent for depth over new page background */
	header{padding:1rem;background:rgba(255,255,255,0.6);border-bottom:1px solid rgba(15,23,42,0.04);backdrop-filter:blur(6px)}
	footer{padding:1rem;background:transparent;border-top:1px solid rgba(15,23,42,0.04);margin-top:auto}
	.text-slate-700{color:#334155}
	.text-slate-900{color:#0f172a}
	/* Replace bright white page bg with subtle cool gradient */
	.bg-slate-50{background: linear-gradient(180deg, #f5f7fb 0%, #eef2f7 100%)}
	.no-underline{text-decoration:none}

/* Use Inter as default for better typography */
body { font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; }
	</style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased font-sans">
	<div class="min-h-screen flex flex-col">
		{% include "header.html" %}

		<main class="flex-1 container mx-auto px-4 py-8 max-w-4xl">
			{% block content %}{% endblock %}
		</main>

		{% include "footer.html" %}
	</div>
</body>
</html>
