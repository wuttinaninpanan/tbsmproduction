{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{% block title %}TBSMRD{% endblock %}</title>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%23dc2626'/%3E%3Cstop offset='100%25' stop-color='%23ef4444'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='6' y='6' width='52' height='52' rx='14' fill='url(%23g)'/%3E%3Cpath d='M20 38c6-12 18-12 24 0' fill='none' stroke='white' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E" />

    {% tailwind_css %}

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', ui-sans-serif, system-ui;
        }
    </style>
</head>

<!-- ✅ พื้นหลังรอบนอก -->
<body class="bg-slate-200 text-slate-800 antialiased">

<div class="min-h-screen flex flex-col">

    {% include "header.html" %}

    <!-- ✅ กล่องเนื้อหาตรงกลาง -->
    <main class="flex-1 flex justify-center px-4 py-10">
        <div class="{% block container_class %}w-full max-w-4xl bg-white rounded-2xl shadow-xl px-8 py-10{% endblock %}">
            {% block content %}{% endblock %}
        </div>
    </main>

    {% include "footer.html" %}

</div>

</body>
</html>
