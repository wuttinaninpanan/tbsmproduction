{% extends "base.html" %}

{% block title %}Login — TBSMRD{% endblock %}

{% block content %}
<section class="py-12">
    <div class="max-w-md mx-auto">
        <!-- Glass Card -->
        <div class="bg-white/80 backdrop-blur border border-slate-200
                    p-8 rounded-2xl shadow-xl">

            <h1 class="text-2xl font-bold text-slate-900 mb-6 text-center">
                เข้าสู่ระบบ
            </h1>

            <form action="/login/" method="post" class="space-y-4">
                {% csrf_token %}

                <!-- Username -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">
                        ชื่อผู้ใช้
                    </label>
                    <input
                        name="username"
                        placeholder="username"
                        class="w-full rounded-lg border border-slate-300
                               px-3 py-2
                               focus:outline-none focus:ring-2 focus:ring-red-500"
                    />
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">
                        รหัสผ่าน
                    </label>
                    <input
                        type="password"
                        name="password"
                        placeholder="••••••••"
                        class="w-full rounded-lg border border-slate-300
                               px-3 py-2
                               focus:outline-none focus:ring-2 focus:ring-red-500"
                    />
                </div>

                <!-- Remember -->
                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center gap-2 text-slate-700">
                        <input type="checkbox" name="remember" class="rounded">
                        จดจำฉัน
                    </label>
                    <a href="/password-reset/"
                       class="text-slate-600 hover:text-red-600 hover:underline">
                        ลืมรหัสผ่าน?
                    </a>
                </div>

                <!-- Submit -->
                <button
                    type="submit"
                    class="w-full py-2 rounded-lg font-semibold text-white
                           bg-gradient-to-r from-red-600 to-red-500
                           hover:opacity-90 transition">
                    เข้าสู่ระบบ
                </button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
